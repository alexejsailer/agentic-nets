# AgenticNet Executor Application Configuration
# Port 8084 (node=8080, test-client=8081, master=8082, agent=8083)
server.port=8084

# Environment configuration import
spring.config.import=optional:file:.env[.properties]

debug=false
spring.main.log-startup-info=false
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.springframework.boot.autoconfigure.logging=OFF
logging.level.org.springframework.boot.context.logging=OFF

# Application info
spring.application.name=agentic-net-executor
info.app.name=AgenticNet Executor Service
info.app.description=Outbound-only executor for AgetnticOS command transitions (polled from agentic-net-master)
info.app.version=0.0.1-SNAPSHOT

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# OpenTelemetry configuration
otel.service.name=agentic-net-executor
otel.resource.attributes=service.name=agentic-net-executor,service.version=0.0.1-SNAPSHOT
otel.exporter.otlp.endpoint=http://localhost:4318
otel.traces.exporter=none
otel.metrics.exporter=none
otel.logs.exporter=none

# Upstream configuration (master or gateway)
# Option A: Direct master (no auth) — executor.upstream.url=http://localhost:8082
# Option B: Through gateway (with JWT) — executor.upstream.url=http://localhost:8083
executor.upstream.url=${EXECUTOR_UPSTREAM_URL:http://localhost:8082}

# JWT auth (only when routing through gateway)
# When both client-id and client-secret are set, executor fetches a JWT and includes it in all requests.
executor.upstream.auth.client-id=${EXECUTOR_AUTH_CLIENT_ID:}
executor.upstream.auth.client-secret=${EXECUTOR_AUTH_CLIENT_SECRET:}

executor.id=${EXECUTOR_ID:agentic-net-executor-default}

# Extended timeout settings for long-running operations
server.tomcat.connection-timeout=600000
spring.mvc.async.request-timeout=600000

# Executor Configuration
executor.max-execution-time-ms=600000
executor.max-retries=3
executor.retry-delay-ms=1000


# =============================================================================
# ROLLING FILE LOGGING CONFIGURATION
# =============================================================================
# Log file location (rolling policy prevents unbounded growth)
logging.file.name=/tmp/agentic-net-executor.log
# Maximum size of each log file before rolling
logging.logback.rollingpolicy.max-file-size=50MB
# Number of archived log files to keep
logging.logback.rollingpolicy.max-history=5
# Total size cap for all log files (current + archived)
logging.logback.rollingpolicy.total-size-cap=250MB
# Clean up old logs on startup if total-size-cap exceeded
logging.logback.rollingpolicy.clean-history-on-start=true

# Logging configuration (set to DEBUG only when debugging specific issues)
logging.level.com.sailer.agenticos.agenticnetexecutor=INFO
logging.level.org.springframework.web.reactive.function.client=WARN
logging.pattern.console=

# Error handling
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# =============================================================================
# CREDENTIALS ENCRYPTION CONFIGURATION
# =============================================================================
# AES-256 encryption key for transition credentials (32 characters required)
# ⚠️ CRITICAL: This key MUST be identical on both agentic-net-master and agentic-net-executor
# ⚠️ PRODUCTION: Change this default key to a secure random value
# ⚠️ SECURITY: Keep this key secret and rotate regularly
agenticos.credentials.key=${AGENTICOS_CREDENTIALS_KEY:}

# =============================================================================
# TRANSITION EXECUTION CONFIGURATION
# =============================================================================

# Transition polling configuration
transition.poll.intervalMs=2000
transition.poll.jitterMs=200



# Transition execution logging (INFO for key events, DEBUG for detailed agentic)
logging.level.com.sailer.agenticos.agenticnetexecutor.transition=INFO
logging.level.com.sailer.agenticos.agenticnetexecutor.transition.action=INFO
logging.level.com.sailer.agenticos.agenticnetexecutor.transition.runtime=INFO
logging.level.org.springframework.web.client.RestTemplate=WARN

# =============================================================================
# EXECUTOR COMMUNICATION CONFIGURATION
# =============================================================================
# Communication mode: POLLING, WEBSOCKET, or HYBRID (default)
# - POLLING: Traditional polling only (every 2s)
# - WEBSOCKET: WebSocket only (real-time commands)
# - HYBRID: Both enabled - polling continues, WebSocket used when available
executor.communication.mode=${EXECUTOR_COMM_MODE:POLLING}

# WebSocket connection to upstream (when mode is WEBSOCKET or HYBRID)
executor.upstream.websocket.url=${EXECUTOR_WS_URL:ws://localhost:8082/ws/executor}
executor.communication.websocket.reconnect-delay-seconds=5
executor.communication.websocket.heartbeat-interval-seconds=30

# Command Execution Configuration
executor.command.http.timeout=60000
executor.command.bash.timeout=30000
executor.command.filesystem.allowed-dirs=/workspace,/tmp/executor
executor.command.filesystem.max-file-size=10485760
executor.command.parallel.max=3

# =============================================================================
# SA-BLOBSTORE INTEGRATION CONFIGURATION
# =============================================================================
# Default BlobStore host for binary URN uploads
agenticos.blobstore.default-host=${BLOBSTORE_HOST:http://localhost:8095}
# Timeout for BlobStore HTTP operations (ms)
agenticos.blobstore.timeout-ms=30000
