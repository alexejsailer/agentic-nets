<!-- AgenticNets Icon - Simplified (Small Sizes) -->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Simple gradient -->
    <linearGradient id="arconSimple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2f4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a4a6f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Container -->
  <rect x="2" y="2" width="28" height="28" rx="6"
        fill="url(#arconSimple)"
        stroke="#4a9eff"
        stroke-width="1.5"/>

  <!-- Simplified constellation: "AC" with 3 stars -->

  <!-- Left star (A) -->
  <circle cx="10" cy="16" r="2" fill="#ffffff"/>

  <!-- Middle star -->
  <circle cx="16" cy="12" r="2.5" fill="#4affef"/>

  <!-- Right star (C) -->
  <circle cx="22" cy="16" r="2" fill="#ffffff"/>

  <!-- Connecting arcs -->
  <path d="M 10,16 Q 13,13 16,12"
        stroke="#4affef"
        stroke-width="1.2"
        fill="none"
        stroke-linecap="round"/>

  <path d="M 16,12 Q 19,13 22,16"
        stroke="#4affef"
        stroke-width="1.2"
        fill="none"
        stroke-linecap="round"/>

  <!-- Bottom arc completing the pattern -->
  <path d="M 10,16 Q 16,20 22,16"
        stroke="#2a9eff"
        stroke-width="1"
        fill="none"
        stroke-linecap="round"
        opacity="0.6"/>
</svg>
