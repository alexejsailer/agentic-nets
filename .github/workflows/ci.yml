name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-java:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - agentic-net-gateway
          - agentic-net-executor
          - agentic-net-vault
          - sa-blobstore
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Build ${{ matrix.service }}
        run: cd ${{ matrix.service }} && ./mvnw clean package -DskipTests -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 1

  build-node:
    name: Build TypeScript services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            agentic-net-cli/package-lock.json
            agentic-net-chat/package-lock.json

      - name: Build agentic-net-cli
        run: cd agentic-net-cli && npm install && npx tsup

      - name: Build agentic-net-chat
        run: cd agentic-net-chat && npm install && npx tsup

      - name: Upload CLI dist
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: agentic-net-cli/dist/
          retention-days: 1

      - name: Upload Chat dist
        uses: actions/upload-artifact@v4
        with:
          name: chat-dist
          path: agentic-net-chat/dist/
          retention-days: 1

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: [build-java, build-node]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build Java services
        run: |
          for svc in agentic-net-gateway agentic-net-executor agentic-net-vault sa-blobstore; do
            echo "::group::Building $svc"
            cd $svc && ./mvnw clean package -DskipTests -B && cd ..
            echo "::endgroup::"
          done

      - name: Build TypeScript services
        run: |
          cd agentic-net-cli && npm install && npx tsup && cd ..
          cd agentic-net-chat && npm install && npx tsup && cd ..

      - name: Build Docker image - gateway
        run: docker build --no-cache -f deployment/dockerfiles/Dockerfile.agentic-net-gateway -t agenticos-gateway:ci agentic-net-gateway/

      - name: Build Docker image - executor
        run: docker build --no-cache -f deployment/dockerfiles/Dockerfile.agentic-net-executor -t agenticos-executor:ci agentic-net-executor/

      - name: Build Docker image - vault
        run: docker build --no-cache -f deployment/dockerfiles/Dockerfile.agentic-net-vault -t agenticos-vault:ci agentic-net-vault/

      - name: Build Docker image - blobstore
        run: docker build --no-cache -f deployment/dockerfiles/Dockerfile.sa-blobstore -t agenticos-blobstore:ci sa-blobstore/

      - name: Build Docker image - cli
        run: docker build --no-cache -f deployment/dockerfiles/Dockerfile.agentic-net-cli -t agenticos-cli:ci agentic-net-cli/

      - name: Build Docker image - chat
        run: docker build --no-cache -f deployment/dockerfiles/Dockerfile.agentic-net-chat -t agenticos-chat:ci .
