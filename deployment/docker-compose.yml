# Agentic-Nets — Hybrid Deployment
#
# Closed-source services (node, master, gui) pull from Docker Hub.
# Open-source services (gateway, executor, cli, chat, blobstore) build locally.
#
# Network topology:
#   agenticnetos-backend (bridge): backend services (node, master, executor, gateway, monitoring, registry)
#   agenticnetos-clients (bridge): client services (gateway, gui, cli, chat)
#
# Gateway auto-generates admin secret on first startup.
# CLI and Chat mount gateway data volume (read-only) to auto-authenticate.
#
# Usage:
#   cd deployment
#   cp .env.template .env   # then edit .env with your settings
#   docker compose up -d
#   docker compose down

name: ${COMPOSE_PROJECT_NAME:-agenticnetos}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

volumes:
  tempo-data:
  prometheus-data:
  grafana-data:
  registry-data:
  openbao-data:
  ollama-data:

networks:
  agenticnetos-backend:
    name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-backend
    driver: bridge
  agenticnetos-clients:
    name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-clients
    driver: bridge

services:

  # ===========================================================================
  # INIT — prepare host bind-mount permissions (first-boot on Linux)
  # ===========================================================================
  # On Linux hosts Docker auto-creates bind-mount directories as root:root. The
  # Java services run as non-root UIDs and cannot write there, hitting
  # "Permission denied" on log files and event storage. This one-shot container
  # creates every bind-mount subdirectory, assigns it to the non-root
  # runtime user, and removes world access before any service starts. Java services wait on this with `service_completed_successfully`.
  # No-op on Docker Desktop (Mac/Windows) where bind mounts are root-mapped.

  init-perms:
    image: alpine:3.20
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-init-perms
    command: ["sh", "-c", "mkdir -p /data/logs/node /data/logs/master /data/logs/executor /data/logs/vault /data/logs/gateway /data/logs/gui /data/logs/cli /data/logs/chat /data/logs/blobstore /data/gateway/jwt /node-data && addgroup -S agenticnet && adduser -S -G agenticnet agenticnet && chown -R agenticnet:agenticnet /data /node-data && chown -R 1001:1001 /data/logs/gui && chmod -R u=rwX,g=rwX,o= /data /node-data && chmod 700 /data/gateway /data/gateway/jwt"]
    volumes:
      - ./data:/data
      - ${AGENTICNETOS_NODE_DATA_DIR:-~/.agenticos}:/node-data
    restart: "no"

  # ===========================================================================
  # MONITORING STACK
  # ===========================================================================

  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:2.10.4}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${TEMPO_PORT:-3200}:3200"
    volumes:
      - tempo-data:/var/tempo
      - ../monitoring/config/tempo.yaml:/etc/tempo.yaml:ro
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    # grafana/tempo image is distroless (no wget/curl/sh available for probes).
    # Disable healthcheck — container exit code is authoritative; if it crashes,
    # compose restarts it. Same pattern as otel-collector below.
    healthcheck:
      disable: true

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.135.0}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
    volumes:
      - ../monitoring/config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      tempo:
        condition: service_started
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    # otel-collector-contrib is distroless — no wget/curl/sh. Disable healthcheck
    # (the container exit code is authoritative; if it crashes, compose restarts it).
    healthcheck:
      disable: true

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.11.2}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-data:/prometheus
      - ../monitoring/config/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0.1}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3000}
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # TOOL REGISTRY
  # ===========================================================================

  agenticnetos-registry:
    image: registry:2
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-registry
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${AGENTICNETOS_REGISTRY_PORT:-5001}:5000"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000/v2/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  agenticos-tool-seeder:
    image: ${DOCKER_CLI_IMAGE:-docker:28-cli}
    profiles: ["tools"]
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-tool-seeder
    depends_on:
      agenticnetos-registry:
        condition: service_healthy
    environment:
      AGENTICNETOS_VERSION: ${AGENTICNETOS_VERSION:-2.1.10}
      AGENTICNETOS_REGISTRY_PORT: ${AGENTICNETOS_REGISTRY_PORT:-5001}
      AGENTICOS_TOOL_REGISTRY_HOST: ${AGENTICOS_TOOL_REGISTRY_HOST:-localhost:5001}
      AGENTICOS_TOOL_SOURCE_REGISTRY: ${AGENTICOS_TOOL_SOURCE_REGISTRY:-docker.io/alexejsailer}
      AGENTICOS_TOOL_SEED_TAG: ${AGENTICOS_TOOL_SEED_TAG:-}
      AGENTICOS_TOOL_SEED_FALLBACK_TAG: ${AGENTICOS_TOOL_SEED_FALLBACK_TAG:-latest}
      AGENTICOS_TOOL_SEED_MODE: ${AGENTICOS_TOOL_SEED_MODE:-mirror}
      AGENTICOS_TOOL_SOURCE_DIR: /agentic-net-tools
      AGENTICOS_TOOL_SEED_IMAGES: ${AGENTICOS_TOOL_SEED_IMAGES:-agenticos-tool-echo agenticos-tool-crawler agenticos-tool-rss agenticos-tool-search agenticos-tool-reddit agenticos-tool-secured-api}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/seed-tool-registry.sh:/usr/local/bin/seed-tool-registry.sh:ro
      - ../agentic-net-tools:/agentic-net-tools:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/seed-tool-registry.sh"]
    networks:
      - agenticnetos-backend
    restart: "no"

  # ===========================================================================
  # CORE BACKEND SERVICES
  # ===========================================================================

  agentic-net-node:
    image: alexejsailer/agenticnetos-node:${AGENTICNETOS_VERSION:-2.1.10}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-node
    depends_on:
      init-perms:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      AGENTICOS_CORS_ALLOWED_ORIGIN_PATTERNS: "${AGENTICOS_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}"
      AGENTICOS_EVENTPERSISTENCE_FILESYSTEM_BASEPATH: /app/data/events
      AGENTICOS_SNAPSHOT_STORE_FILESYSTEM_DIRECTORY: /app/data/snapshots
      AGENTICOS_PERSISTENCE_RECOVERY_MODELSBASEPATH: /app/data/models
      AGENTICOS_PERSISTENCE_RECOVERY_EVENTBASEPATH: /app/data/events
      AGENTICOS_PERSISTENCE_RECOVERY_SNAPSHOTBASEPATH: /app/data/snapshots
      LOG_PATH: /app/logs
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: agentic-net-node
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=docker,team=agenticnet,component=node
    volumes:
      - ${AGENTICNETOS_NODE_DATA_DIR:-~/.agenticos}:/app/data
      - ./data/logs/node:/app/logs
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${AGENTIC_NET_NODE_PORT:-8080}:8080"
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${AGENTIC_NET_NODE_MEMORY_LIMIT:-2G}
          cpus: "${AGENTIC_NET_NODE_CPU_LIMIT:-1.0}"
        reservations:
          memory: 512M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  agentic-net-master:
    image: alexejsailer/agenticnetos-master:${AGENTICNETOS_VERSION:-2.1.10}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-master
    depends_on:
      init-perms:
        condition: service_completed_successfully
      agentic-net-node:
        condition: service_healthy
      agentic-net-vault:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      AGENTIC_NET_NODE_BASE_URL: http://agentic-net-node:8080/api
      BLOBSTORE_BASE_URL: http://sa-blobstore:8080
      AGENTICOS_VAULT_URL: http://agentic-net-vault:8085
      AGENTICOS_CREDENTIALS_KEY: ${AGENTICOS_SETTINGS_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      AGENTICOS_MODEL_TIER: ${AGENTICOS_MODEL_TIER:-medium}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_HIGH_MODEL: ${OPENAI_HIGH_MODEL:-gpt-5.4}
      OPENAI_MEDIUM_MODEL: ${OPENAI_MEDIUM_MODEL:-gpt-5.4-mini}
      OPENAI_LOW_MODEL: ${OPENAI_LOW_MODEL:-gpt-5.4-nano}
      AGENTICOS_REGISTRY_ENABLED: "${AGENTICOS_REGISTRY_ENABLED:-true}"
      AGENTICOS_REGISTRY_URL: "http://agenticnetos-registry:5000"
      AGENTICOS_REGISTRY_INTERNAL_URL: "http://agenticnetos-registry:5000"
      AGENTICOS_DOCKER_ENABLED: "${AGENTICOS_DOCKER_ENABLED:-true}"
      AGENTICOS_DOCKER_NETWORK: "${COMPOSE_PROJECT_NAME:-agenticnetos}-backend"
      AGENTICOS_DOCKER_REGISTRY_HOST: "localhost:${AGENTICNETOS_REGISTRY_PORT:-5001}"
      AGENTICOS_DOCKER_IMAGE_ALLOWLIST: "${AGENTICOS_DOCKER_IMAGE_ALLOWLIST:-localhost:5001/agenticos-*}"
      GATEWAY_INTERNAL_SECRET: "${GATEWAY_INTERNAL_SECRET:-agenticos-local-internal-secret-change-me}"
      AGENTICOS_CORS_ALLOWED_ORIGIN_PATTERNS: "${AGENTICOS_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}"
      LOG_PATH: /app/logs
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: agentic-net-master
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=docker,team=agenticnet,component=master
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/logs/master:/app/logs
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${AGENTIC_NET_MASTER_PORT:-8082}:8082"
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${AGENTIC_NET_MASTER_MEMORY_LIMIT:-2G}
          cpus: "${AGENTIC_NET_MASTER_CPU_LIMIT:-1.0}"
        reservations:
          memory: 512M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  agentic-net-executor:
    build:
      context: ../agentic-net-executor
      dockerfile: ../deployment/dockerfiles/Dockerfile.agentic-net-executor
    image: alexejsailer/agenticnetos-executor:${AGENTICNETOS_VERSION:-2.1.10}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-executor
    depends_on:
      init-perms:
        condition: service_completed_successfully
      agentic-net-master:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EXECUTOR_UPSTREAM_URL: http://agentic-net-master:8082
      AGENTIC_NET_NODE_BASE_URL: http://agentic-net-node:8080/api
      LOG_PATH: /app/logs
      AGENTICOS_CORS_ALLOWED_ORIGIN_PATTERNS: "${AGENTICOS_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}"
      AGENTICOS_CREDENTIALS_KEY: ${AGENTICOS_SETTINGS_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: agentic-net-executor
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=docker,team=agenticnet,component=executor
    volumes:
      - ./data/logs/executor:/app/logs
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${AGENTIC_NET_EXECUTOR_PORT:-8084}:8084"
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${AGENTIC_NET_EXECUTOR_MEMORY_LIMIT:-1G}
          cpus: "${AGENTIC_NET_EXECUTOR_CPU_LIMIT:-0.75}"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # LLM RUNTIME
  # ===========================================================================

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.21.0}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-ollama
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - agenticnetos-backend
      - agenticnetos-clients
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-8G}
          cpus: "${OLLAMA_CPU_LIMIT:-2.0}"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # SECRETS MANAGEMENT
  # ===========================================================================

  openbao:
    image: quay.io/openbao/openbao:2.1.0
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-openbao
    command: ["server", "-dev", "-dev-root-token-id=${OPENBAO_DEV_ROOT_TOKEN:-agenticos-dev-token}"]
    environment:
      BAO_ADDR: "http://0.0.0.0:8200"
    volumes:
      - openbao-data:/openbao/data
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "bao", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  agentic-net-vault:
    build:
      context: ../agentic-net-vault
      dockerfile: ../deployment/dockerfiles/Dockerfile.agentic-net-vault
    image: alexejsailer/agenticnetos-vault:${AGENTICNETOS_VERSION:-2.1.10}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-vault
    depends_on:
      init-perms:
        condition: service_completed_successfully
      openbao:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      VAULT_OPENBAO_URL: http://openbao:8200
      VAULT_OPENBAO_TOKEN: ${OPENBAO_DEV_ROOT_TOKEN:-agenticos-dev-token}
      LOG_PATH: /app/logs
      AGENTICOS_CORS_ALLOWED_ORIGIN_PATTERNS: "${AGENTICOS_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: agentic-net-vault
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=docker,team=agenticnet,component=vault
    volumes:
      - ./data/logs/vault:/app/logs
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${AGENTIC_NET_VAULT_PORT:-8085}:8085"
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${AGENTIC_NET_VAULT_MEMORY_LIMIT:-512M}
          cpus: "${AGENTIC_NET_VAULT_CPU_LIMIT:-0.5}"
        reservations:
          memory: 128M
          cpus: "0.1"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/api/health/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # API GATEWAY
  # ===========================================================================

  agentic-net-gateway:
    build:
      context: ../agentic-net-gateway
      dockerfile: ../deployment/dockerfiles/Dockerfile.agentic-net-gateway
    image: alexejsailer/agenticnetos-gateway:${AGENTICNETOS_VERSION:-2.1.10}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-gateway
    depends_on:
      init-perms:
        condition: service_completed_successfully
      agentic-net-master:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MASTER_URL: http://agentic-net-master:8082
      NODE_URL: http://agentic-net-node:8080
      VAULT_URL: http://agentic-net-vault:8085
      GATEWAY_TIMEOUT: ${GATEWAY_TIMEOUT:-30}
      GATEWAY_PROXY_TIMEOUT: ${GATEWAY_PROXY_TIMEOUT:-300}
      AGENTICOS_ADMIN_SECRET: ${AGENTICOS_ADMIN_SECRET:-}
      GATEWAY_INTERNAL_SECRET: "${GATEWAY_INTERNAL_SECRET:-agenticos-local-internal-secret-change-me}"
      GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS: "${GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}"
      GATEWAY_JWT_KEY_DIR: /app/data/jwt
      LOG_PATH: /app/logs
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: agentic-net-gateway
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=docker,team=agenticnet,component=gateway
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${AGENTIC_NET_GATEWAY_PORT:-8083}:8083"
    volumes:
      - ./data/gateway:/app/data
      - ./data/logs/gateway:/app/logs
    networks:
      - agenticnetos-backend
      - agenticnetos-clients
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${AGENTIC_NET_GATEWAY_MEMORY_LIMIT:-1G}
          cpus: "${AGENTIC_NET_GATEWAY_CPU_LIMIT:-0.75}"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/api/health/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # CLIENT SERVICES
  # ===========================================================================

  agentic-net-gui:
    image: alexejsailer/agenticnetos-gui:${AGENTICNETOS_VERSION:-2.1.10}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-gui
    depends_on:
      init-perms:
        condition: service_completed_successfully
      agentic-net-gateway:
        condition: service_healthy
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${AGENTIC_NET_GUI_PORT:-4200}:4200"
    volumes:
      - ./data/logs/gui:/app/logs
    networks:
      - agenticnetos-clients
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4200/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  agentic-net-cli:
    build:
      context: ../agentic-net-cli
      dockerfile: ../deployment/dockerfiles/Dockerfile.agentic-net-cli
    image: alexejsailer/agenticnetos-cli:${AGENTICNETOS_VERSION:-2.1.10}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-cli
    depends_on:
      init-perms:
        condition: service_completed_successfully
      agentic-net-gateway:
        condition: service_healthy
    environment:
      AGENTICOS_GATEWAY_URL: http://agentic-net-gateway:8083
      AGENTICOS_GATEWAY_SECRET_FILE: /app/gateway-data/jwt/admin-secret
    volumes:
      - ./data/gateway/jwt/admin-secret:/app/gateway-data/jwt/admin-secret:ro
      - ./data/logs/cli:/app/logs
    networks:
      - agenticnetos-clients
    restart: "no"
    stdin_open: true
    tty: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${AGENTICNETOS_CLI_MEMORY_LIMIT:-512M}
          cpus: "${AGENTICNETOS_CLI_CPU_LIMIT:-0.5}"

  agentic-net-chat:
    build:
      context: ..
      dockerfile: deployment/dockerfiles/Dockerfile.agentic-net-chat
    image: alexejsailer/agenticnetos-chat:${AGENTICNETOS_VERSION:-2.1.10}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-chat
    profiles:
      - telegram
    depends_on:
      init-perms:
        condition: service_completed_successfully
      agentic-net-gateway:
        condition: service_healthy
    environment:
      AGENTICOS_GATEWAY_URL: http://agentic-net-gateway:8083
      AGENTICOS_GATEWAY_SECRET_FILE: /app/gateway-data/jwt/admin-secret
      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_BOT_WEBHOOK_BASE_URL: ${TELEGRAM_BOT_WEBHOOK_BASE_URL:-}
      TELEGRAM_BOT_WEBHOOK_SECRET: ${TELEGRAM_BOT_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_ALLOWED_CHAT_IDS: ${TELEGRAM_BOT_ALLOWED_CHAT_IDS:-}
      AGENTICOS_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      AGENTICOS_MODEL_TIER: ${AGENTICOS_MODEL_TIER:-medium}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_HIGH_MODEL: ${ANTHROPIC_HIGH_MODEL:-claude-opus-4-7}
      ANTHROPIC_MEDIUM_MODEL: ${ANTHROPIC_MEDIUM_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_LOW_MODEL: ${ANTHROPIC_LOW_MODEL:-claude-haiku-4-5-20251001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_HIGH_MODEL: ${OPENAI_HIGH_MODEL:-gpt-5.4}
      OPENAI_MEDIUM_MODEL: ${OPENAI_MEDIUM_MODEL:-gpt-5.4-mini}
      OPENAI_LOW_MODEL: ${OPENAI_LOW_MODEL:-gpt-5.4-nano}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_HIGH_MODEL: ${OLLAMA_HIGH_MODEL:-llama3.2}
      OLLAMA_MEDIUM_MODEL: ${OLLAMA_MEDIUM_MODEL:-llama3.2}
      OLLAMA_LOW_MODEL: ${OLLAMA_LOW_MODEL:-llama3.2}
    volumes:
      - ./data/gateway/jwt/admin-secret:/app/gateway-data/jwt/admin-secret:ro
      - ./data/logs/chat:/app/logs
    networks:
      - agenticnetos-clients
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${AGENTICNETOS_CHAT_MEMORY_LIMIT:-512M}
          cpus: "${AGENTICNETOS_CHAT_CPU_LIMIT:-0.5}"

  sa-blobstore:
    build:
      context: ../sa-blobstore
      dockerfile: ../deployment/dockerfiles/Dockerfile.sa-blobstore
    image: alexejsailer/agenticnetos-blobstore:${AGENTICNETOS_VERSION:-2.1.10}
    container_name: ${COMPOSE_PROJECT_NAME:-agenticnetos}-blobstore
    depends_on:
      init-perms:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      LOG_PATH: /app/logs
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: sa-blobstore
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=docker,team=agenticnet,component=blobstore
    ports:
      - "${AGENTICNETOS_BIND_ADDRESS:-127.0.0.1}:${SA_BLOBSTORE_PORT:-8090}:8080"
    volumes:
      - ./data/logs/blobstore:/app/logs
    networks:
      - agenticnetos-backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.75"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      # blobstore exposes actuator on the management port (9090), not 8080 (API).
      test: ["CMD-SHELL", "curl -f http://localhost:9090/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

