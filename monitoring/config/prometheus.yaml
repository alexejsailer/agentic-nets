global:
  scrape_interval: 10s
  evaluation_interval: 15s

rule_files:
  # AgenticNetOS alerting rules
  # - "/etc/prometheus/agenticos-alerts.yml"

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    scrape_interval: 5s

  - job_name: "agentic-net-node"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          application: "agentic-net-node"
          environment: "local-native"
          component: "core"
    scrape_interval: 5s
    scrape_timeout: 3s

  - job_name: "agentic-net-master"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          application: "agentic-net-master"
          environment: "local-native"
          component: "orchestration"
    scrape_interval: 5s
    scrape_timeout: 3s

  - job_name: "agentic-net-executor"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8084"]
        labels:
          application: "agentic-net-executor"
          environment: "local-native"
          component: "executor"
    scrape_interval: 5s
    scrape_timeout: 3s

  - job_name: "agentic-net-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          application: "agentic-net-gateway"
          environment: "local-native"
          component: "gateway"
    scrape_interval: 5s
    scrape_timeout: 3s

  - job_name: "sa-blobstore"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8090"]
        labels:
          application: "sa-blobstore"
          environment: "local-native"
          component: "storage"
    scrape_interval: 5s
    scrape_timeout: 3s
