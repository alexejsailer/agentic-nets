services:
  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:2.10.4}
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.135.0}
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on: [tempo]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.11.2}
    command: ["--config.file=/etc/prometheus/prometheus.yaml"]
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./alerts:/etc/prometheus/alerts:ro
    depends_on: [otel-collector]
    ports:
      - "9090:9090"

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0.1}
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning
    depends_on: [prometheus, tempo]
    ports:
      - "3000:3000"

volumes:
  tempo-data:
