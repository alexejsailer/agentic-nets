# AgenticNet Gateway Configuration
# Port 8083 — only internet-facing service in AgetnticOS
server.port=8083

spring.config.import=optional:file:.env[.properties]

debug=false
spring.main.log-startup-info=false
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.springframework.boot.autoconfigure.logging=OFF
logging.level.org.springframework.boot.context.logging=OFF

# Application info
spring.application.name=agentic-net-gateway
info.app.name=AgenticNet Gateway
info.app.description=OAuth2 API gateway for AgetnticOS — issues JWTs and proxies to master
info.app.version=0.0.1-SNAPSHOT

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# OpenTelemetry
otel.service.name=agentic-net-gateway
otel.resource.attributes=service.name=agentic-net-gateway,service.version=0.0.1-SNAPSHOT
otel.exporter.otlp.endpoint=http://localhost:4318
otel.traces.exporter=none
otel.metrics.exporter=none
otel.logs.exporter=none

# Gateway -> Master relay
gateway.master-url=${MASTER_URL:http://localhost:8082}
gateway.node-url=${NODE_URL:http://localhost:8080}
gateway.vault-url=${VAULT_URL:http://localhost:8085}
gateway.timeout-seconds=${GATEWAY_TIMEOUT:30}
gateway.proxy-timeout-seconds=${GATEWAY_PROXY_TIMEOUT:300}

# Spring MVC async request timeout — must match proxy-timeout-seconds
# Default is 30s which causes 503 (AsyncRequestTimeoutException) for long LLM calls
spring.mvc.async.request-timeout=${GATEWAY_PROXY_TIMEOUT_MS:300000}

# OAuth2 Client Credentials
gateway.client-id=${AGENTICOS_CLIENT_ID:agenticos-admin}
gateway.client-secret=${AGENTICOS_ADMIN_SECRET:}
gateway.readonly-client-id=${AGENTICOS_READONLY_CLIENT_ID:agenticos-readonly}
gateway.readonly-client-secret=${AGENTICOS_READONLY_SECRET:}
gateway.jwt-key-dir=${GATEWAY_JWT_KEY_DIR:./data/jwt}
gateway.token-ttl-seconds=${GATEWAY_TOKEN_TTL:3600}
gateway.rate-limit-per-minute=${GATEWAY_RATE_LIMIT:10}
gateway.trusted-proxies=${GATEWAY_TRUSTED_PROXIES:}
gateway.master-heartbeat-ttl-seconds=${GATEWAY_MASTER_HEARTBEAT_TTL:60}
gateway.proxy-fan-out-timeout-seconds=${GATEWAY_FAN_OUT_TIMEOUT:30}

# Logging
logging.level.com.sailer.agenticos.agenticnetgateway=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId},%X{spanId}] - %msg%n
