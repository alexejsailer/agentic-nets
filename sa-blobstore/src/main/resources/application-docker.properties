# Docker-specific configuration for SA-BLOBSTORE
spring.application.name=sa-blobstore

# OpenTelemetry Configuration (disabled for now due to compatibility issues)
# otel.service.name=${NODE_ID:node1}
# otel.resource.attributes=deployment.environment=docker,team=blobstore

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.server.port=9090
logging.level.com.sailer.blobstore=INFO

# =============================================================================
# SA-BLOBSTORE DOCKER CONFIGURATION  
# =============================================================================

# Node identification (overridden by environment variable)
sa.blobstore.node.id=${NODE_ID:node1}

# Cluster setup (will be configured by Docker Compose)
sa.blobstore.cluster.nodes=${CLUSTER_NODES:http://node1:8080,http://node2:8080,http://node3:8080}

# Storage configuration (mounted volume)
sa.blobstore.storage.path=${STORAGE_PATH:/app/data}

# Replication control (configurable via environment)
sa.blobstore.replication.min-replicas=${MIN_REPLICAS:1}
sa.blobstore.replication.max-replicas=${MAX_REPLICAS:2}

# Hash-based storage tuning
sa.blobstore.hash.depth=${HASH_DEPTH:3}
sa.blobstore.hash.chars-per-level=${HASH_CHARS_PER_LEVEL:2}

# Timeout configuration (milliseconds)
sa.blobstore.timeout.network=${TIMEOUT_NETWORK:5000}
sa.blobstore.timeout.file-operation=${TIMEOUT_FILE_OPERATION:10000}
sa.blobstore.timeout.total-operation=${TIMEOUT_TOTAL_OPERATION:30000}

# Cleanup configuration
sa.blobstore.cleanup.temp-file-max-age=${CLEANUP_TEMP_FILE_MAX_AGE:1800000}
sa.blobstore.cleanup.schedule-interval=${CLEANUP_SCHEDULE_INTERVAL:300000}
sa.blobstore.cleanup.abandoned-session-timeout-ms=${CLEANUP_ABANDONED_SESSION_TIMEOUT:900000}

# Performance tuning
sa.blobstore.default.overwrite=${DEFAULT_OVERWRITE:false}
sa.blobstore.storage.force-sync=${STORAGE_FORCE_SYNC:true}
sa.blobstore.storage.buffer-size=${STORAGE_BUFFER_SIZE:8192}

# Upload constraints
sa.blobstore.upload.max-file-size=${UPLOAD_MAX_FILE_SIZE:100MB}
sa.blobstore.upload.max-concurrent-uploads=${UPLOAD_MAX_CONCURRENT_UPLOADS:10}
sa.blobstore.upload.timeout-ms=${UPLOAD_TIMEOUT_MS:60000}
sa.blobstore.upload.atomic-move-timeout-ms=${UPLOAD_ATOMIC_MOVE_TIMEOUT_MS:10000}

# Server configuration
server.port=8080
server.servlet.context-path=
server.max-http-header-size=64KB
server.tomcat.max-swallow-size=${UPLOAD_MAX_FILE_SIZE:100MB}

# Docker networking
server.address=0.0.0.0