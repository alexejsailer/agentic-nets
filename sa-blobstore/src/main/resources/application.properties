spring.application.name=sa-blobstore

# OpenTelemetry Configuration
otel.service.name=sa-blobstore
otel.resource.attributes=deployment.environment=dev,team=blobstore

# Tracing
otel.traces.exporter=otlp
otel.exporter.otlp.endpoint=http://localhost:4317
otel.exporter.otlp.protocol=grpc

# Metrics
otel.metrics.exporter=otlp
otel.logs.exporter=none

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
logging.pattern.level=%5p trace_id=%X{trace_id} span_id=%X{span_id}

# =============================================================================
# SA-BLOBSTORE CONFIGURATION
# =============================================================================

# Cluster configuration (using new structure)
sa.blobstore.cluster.node-id=node1
sa.blobstore.cluster.min-replicas=1
sa.blobstore.cluster.max-replicas=2
sa.blobstore.cluster.nodes=http://localhost:8080,http://localhost:8081,http://localhost:8082
sa.blobstore.cluster.health-check-interval=30000
sa.blobstore.cluster.max-retries=3
sa.blobstore.cluster.retry-delay=1000

# Storage configuration  
sa.blobstore.storage.path=./target/blobstore-data

# Replication control
sa.blobstore.replication.min-replicas=1
sa.blobstore.replication.max-replicas=2

# Hash-based storage tuning
sa.blobstore.hash.depth=3
sa.blobstore.hash.chars-per-level=2

# Timeout configuration (milliseconds)
sa.blobstore.timeout.network=5000
sa.blobstore.timeout.file-operation=10000
sa.blobstore.timeout.total-operation=30000

# Cleanup configuration
sa.blobstore.cleanup.temp-file-max-age=1800000
sa.blobstore.cleanup.schedule-interval=300000

# Performance tuning
sa.blobstore.default.overwrite=false
sa.blobstore.storage.force-sync=true
sa.blobstore.storage.buffer-size=8192

# Upload constraints
sa.blobstore.upload.max-file-size=100MB
sa.blobstore.upload.max-concurrent-uploads=10

# Server configuration
server.port=8080
server.servlet.context-path=
server.max-http-header-size=64KB
server.tomcat.max-swallow-size=100MB