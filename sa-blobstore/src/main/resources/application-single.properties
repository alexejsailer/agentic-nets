# =============================================================================
# SA-BLOBSTORE SINGLE NODE CONFIGURATION
# =============================================================================
# Use this profile for local development and testing:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=single
#
# Or with environment variable:
#   SPRING_PROFILES_ACTIVE=single ./mvnw spring-boot:run
# =============================================================================

# Single node runs on port 8095 (AgetnticOS standard BlobStore port)
server.port=8095

# Standalone node configuration (no cluster)
sa.blobstore.cluster.node-id=standalone
sa.blobstore.cluster.min-replicas=1
sa.blobstore.cluster.max-replicas=1
sa.blobstore.cluster.nodes=http://localhost:8095
sa.blobstore.cluster.health-check-interval=60000

# Local storage for development
sa.blobstore.storage.path=./target/blobstore-data

# Replication disabled for single node
sa.blobstore.replication.min-replicas=1
sa.blobstore.replication.max-replicas=1

# Disable OpenTelemetry for local development (optional)
otel.traces.exporter=none
otel.metrics.exporter=none

# Quieter logging for development
logging.level.root=INFO
logging.level.com.sailer.blobstore=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
