# Test configuration for SA-BLOBSTORE
spring.application.name=sa-blobstore-test

# Disable OpenTelemetry completely for tests
otel.java.global-autoconfigure.enabled=false
otel.traces.exporter=none
otel.metrics.exporter=none
otel.logs.exporter=none
otel.instrumentation.spring.enabled=false

# Test storage configuration
sa.blobstore.node.id=test-node
sa.blobstore.storage.path=/tmp/sa-blobstore-test
sa.blobstore.cluster.nodes=http://localhost:8080

# Reduced timeouts for faster tests
sa.blobstore.timeout.network=1000
sa.blobstore.timeout.file-operation=2000
sa.blobstore.timeout.total-operation=5000

# Fast cleanup for tests
sa.blobstore.cleanup.temp-file-max-age=10000
sa.blobstore.cleanup.schedule-interval=5000

# Minimal replication for tests
sa.blobstore.replication.min-replicas=0
sa.blobstore.replication.max-replicas=0

# Logging
logging.level.com.sailer.blobstore=DEBUG
logging.level.root=INFO