events {
    worker_connections 1024;
}

http {
    upstream blobstore_cluster {
        # Round-robin load balancing across all nodes
        server node1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server node2:8080 weight=1 max_fails=3 fail_timeout=30s;
        server node3:8080 weight=1 max_fails=3 fail_timeout=30s;
    }

    # Enable keepalive connections
    upstream blobstore_cluster_keepalive {
        server node1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server node2:8080 weight=1 max_fails=3 fail_timeout=30s;
        server node3:8080 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Main server configuration
    server {
        listen 80;
        server_name localhost;

        # Increase client body size for blob uploads
        client_max_body_size 100M;
        client_body_timeout 300s;
        client_header_timeout 60s;

        # Enable gzip compression
        gzip on;
        gzip_types application/json text/plain;

        # Health check endpoint - direct to any healthy node
        location /health {
            access_log off;
            proxy_pass http://blobstore_cluster/actuator/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Blob API endpoints - load balanced
        location /api/blobs {
            proxy_pass http://blobstore_cluster_keepalive;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Upload timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Buffer settings for large uploads
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Admin API endpoints - load balanced
        location /api/admin {
            proxy_pass http://blobstore_cluster_keepalive;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Actuator endpoints for monitoring
        location /actuator {
            proxy_pass http://blobstore_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default route - load balanced
        location / {
            proxy_pass http://blobstore_cluster_keepalive;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}