# AgenticNet Vault Application Configuration
# Port 8085 (node=8080, master=8082, gateway=8083, executor=8084, vault=8085)
server.port=8085

# Environment configuration import
spring.config.import=optional:file:.env[.properties]

debug=false
spring.main.log-startup-info=false
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.springframework.boot.autoconfigure.logging=OFF
logging.level.org.springframework.boot.context.logging=OFF

# Application info
spring.application.name=agentic-net-vault
info.app.name=AgenticNet Vault Service
info.app.description=Secrets management service for AgetnticOS transition credentials (OpenBao backend)
info.app.version=0.0.1-SNAPSHOT

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# OpenTelemetry configuration
otel.service.name=agentic-net-vault
otel.resource.attributes=service.name=agentic-net-vault,service.version=0.0.1-SNAPSHOT
otel.exporter.otlp.endpoint=http://localhost:4318
otel.traces.exporter=none
otel.metrics.exporter=none
otel.logs.exporter=none

# =============================================================================
# OPENBAO CONFIGURATION
# =============================================================================
# OpenBao server URL (Vault-compatible API)
vault.openbao-url=${VAULT_OPENBAO_URL:http://localhost:8200}
# Authentication token (must be set via VAULT_OPENBAO_TOKEN env var or AppRole)
vault.openbao-token=${VAULT_OPENBAO_TOKEN:}
# KV v2 secrets engine mount path
vault.kv-mount=secret
# Base path within KV engine for credentials
vault.credentials-path=agenticos/credentials

# AppRole auth (production) — when set, token auth is ignored
vault.approle.role-id=${VAULT_APPROLE_ROLE_ID:}
vault.approle.secret-id=${VAULT_APPROLE_SECRET_ID:}

# =============================================================================
# ROLLING FILE LOGGING CONFIGURATION
# =============================================================================
logging.file.name=/tmp/agentic-net-vault.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=5
logging.logback.rollingpolicy.total-size-cap=250MB
logging.logback.rollingpolicy.clean-history-on-start=true

# Logging levels
logging.level.com.sailer.agenticos.agenticnetvault=INFO
logging.level.org.springframework.vault=WARN
logging.pattern.console=

# Error handling
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
